services:
  gateway:
    build: .
    env_file: ${YUKI_ENV_FILE:-.env}
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-credentials.json
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS_HOST:?Set the host path to the GCP credentials JSON}:/run/secrets/gcp-credentials.json:ro
    ports:
      - "127.0.0.1:8787:8787"
    restart: unless-stopped
