services:
  gateway:
    build: .
    env_file: ${YUKI_ENV_FILE:-.env}
    ports:
      - "127.0.0.1:8787:8787"
    restart: unless-stopped

  whisper:
    profiles: ["digitalocean-fallback"]
    build: ./stt
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    restart: unless-stopped
